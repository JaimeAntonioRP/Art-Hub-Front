<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            overflow: hidden; /* Prevent scrolling during animation */
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(19, 19, 19, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Scanning Animation */
        .scan-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 2px solid theme('colors.primary-container');
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2), inset 0 0 20px rgba(212, 175, 55, 0.1);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .scan-container::before, .scan-container::after,
        .scan-corners::before, .scan-corners::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: theme('colors.primary');
            border-style: solid;
        }
        
        .scan-container::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .scan-container::after { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
        .scan-corners::before { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
        .scan-corners::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: theme('colors.primary');
            box-shadow: 0 0 10px theme('colors.primary'), 0 0 20px theme('colors.primary');
            opacity: 0;
        }

        @keyframes scanMove {
            0% { top: 0; opacity: 1; }
            50% { top: 100%; opacity: 1; }
            100% { top: 0; opacity: 1; }
        }

        /* Validation Card */
        .validation-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 400px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10;
        }
        
        .validation-card.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Particle Flow */
        .particle {
            position: absolute;
            color: theme('colors.primary');
            font-family: monospace;
            font-size: 10px;
            pointer-events: none;
            opacity: 0;
        }
        
        @keyframes flowUp {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-200px) scale(0.5); opacity: 0; }
        }

        /* Progress Bar */
        .progress-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: theme('colors.primary');
            width: 0%;
            box-shadow: 0 0 10px theme('colors.primary');
        }

        /* Success Image */
        .success-image-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 20;
        }
        
        .success-image-container.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
        
        /* Spinner */
        .spinner {
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-top: 2px solid theme('colors.primary');
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('startVerifyBtn');
            const mobileStartBtn = document.getElementById('mobileStartVerifyBtn');
            const scanOverlay = document.getElementById('scanOverlay');
            const scanLine = document.getElementById('scanLine');
            const validationCard = document.getElementById('validationCard');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const validationTitle = document.getElementById('validationTitle');
            const validSpinner = document.getElementById('validSpinner');
            const successState = document.getElementById('successState');
            const closeBtn = document.getElementById('closeBtn');
            const bgImage = document.getElementById('bgImage');
            const particleContainer = document.getElementById('particleContainer');

            let animationTimeout;

            function startSequence() {
                // Reset
                clearTimeout(animationTimeout);
                scanOverlay.style.opacity = '0';
                scanLine.style.animation = 'none';
                validationCard.classList.remove('active');
                successState.classList.remove('active');
                progressFill.style.width = '0%';
                particleContainer.innerHTML = '';
                bgImage.style.filter = 'brightness(0.3) blur(2px)';

                // 1. Show Scanning Viewfinder
                setTimeout(() => {
                    scanOverlay.style.opacity = '1';
                    scanLine.style.animation = 'scanMove 2s ease-in-out infinite';
                    createParticles();
                }, 500);

                // 2. Hide Scan, Show Validation Card
                setTimeout(() => {
                    scanOverlay.style.opacity = '0';
                    scanLine.style.animation = 'none';
                    validationCard.classList.add('active');
                    validSpinner.style.opacity = '1';
                    
                    // Progress Animation
                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += Math.random() * 15;
                        if (progress > 100) progress = 100;
                        progressFill.style.width = `${progress}%`;
                        
                        if (progress > 50) {
                            progressText.textContent = "Verifying Certificate";
                            validationTitle.textContent = "Checking Provenance";
                        }
                        
                        if (progress === 100) {
                            clearInterval(interval);
                            finishSequence();
                        }
                    }, 400);

                }, 3000);
            }

            function finishSequence() {
                setTimeout(() => {
                    validationCard.classList.remove('active');
                    successState.classList.add('active');
                    bgImage.style.filter = 'brightness(0.1) blur(10px)';
                    createSuccessParticles();
                }, 800);
            }

            function createParticles() {
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const p = document.createElement('div');
                        p.className = 'particle';
                        p.textContent = Math.random().toString(16).substring(2, 8);
                        p.style.left = `${50 + (Math.random() * 10 - 5)}%`;
                        p.style.top = `${50 + (Math.random() * 10 - 5)}%`;
                        p.style.animation = `flowUp ${2 + Math.random()}s ease-out forwards`;
                        particleContainer.appendChild(p);
                        
                        setTimeout(() => p.remove(), 3000);
                    }, i * 150);
                }
            }
            
            function createSuccessParticles() {
                for (let i = 0; i < 30; i++) {
                    const p = document.createElement('div');
                    p.className = 'absolute w-1 h-1 bg-primary rounded-full opacity-0';
                    p.style.left = '50%';
                    p.style.top = '50%';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 100 + Math.random() * 150;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance;
                    
                    p.animate([
                        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                        { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                    ], {
                        duration: 1000 + Math.random() * 1000,
                        easing: 'cubic-bezier(0.19, 1, 0.22, 1)'
                    });
                    
                    particleContainer.appendChild(p);
                    setTimeout(() => p.remove(), 2000);
                }
            }

            startBtn.addEventListener('click', (e) => {
                e.preventDefault();
                startSequence();
            });
            
            mobileStartBtn.addEventListener('click', (e) => {
                e.preventDefault();
                startSequence();
            });
            
            closeBtn.addEventListener('click', () => {
                successState.classList.remove('active');
                bgImage.style.filter = 'brightness(0.4) blur(0px)';
            });
        });
    </script>
